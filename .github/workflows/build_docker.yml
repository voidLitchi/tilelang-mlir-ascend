name: Build Docker

on:
  workflow_call:
    inputs:
      cann_version:
        description: 'CANN version'
        type: string
        default: '8.5.0'
      checkout-ref:
        description: 'Git ref to checkout'
        type: string
        default: ''
    secrets:
      QUAY_USERNAME:
        required: true
      QUAY_PASSWORD:
        required: true
  workflow_dispatch:
    inputs:
      cann_version:
        description: 'CANN version'
        required: false
        default: '8.5.0'

env:
  REGISTRY: quay.io
  ORG: ascend
  IMAGE_NAME: tilelang
  OS: ubuntu22.04
  PYTHON: py3.11

jobs:
  build-arm64:
    runs-on: ubuntu-22.04-arm
    strategy:
      matrix:
        chip: [910b, a3]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout-ref || '' }}
          submodules: recursive

      - name: Read version from VERSION
        id: version
        run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build & Push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/arm64
          build-args: |
            REGION=other
            CANN_VERSION=${{ inputs.cann_version }}
            CHIP_TYPE=${{ matrix.chip }}
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-${{ matrix.chip }}-${{ env.OS }}-${{ env.PYTHON }}-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-amd64:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        chip: [910b, a3]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout-ref || '' }}
          submodules: recursive

      - name: Read version from VERSION
        id: version
        run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build & Push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            REGION=other
            CANN_VERSION=${{ inputs.cann_version }}
            CHIP_TYPE=${{ matrix.chip }}
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-${{ matrix.chip }}-${{ env.OS }}-${{ env.PYTHON }}-x86_64
          cache-from: type=gha
          cache-to: type=gha,mode=max
