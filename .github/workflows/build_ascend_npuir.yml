name: Build AscendNPU-IR

on:
  push:
    branches: [main]
  workflow_call:
    inputs:
      checkout-ref:
        description: "Git ref to checkout (leave empty for default event ref)"
        type: string
        default: ''
    outputs:
      npuir-commit:
        description: "AscendNPU-IR commit hash"
        value: ${{ jobs.build-npuir.outputs.npuir-commit }}
  workflow_dispatch:

env:
  NPUIR_INSTALL_DIR: npuir-prebuild

jobs:
  build-npuir:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    outputs:
      npuir-commit: ${{ steps.npuir-version.outputs.commit }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.checkout-ref || '' }}
        fetch-depth: 1

    - name: Get AscendNPU-IR commit ID
      id: npuir-version
      run: |
        NPUIR_COMMIT=$(git rev-parse HEAD:3rdparty/AscendNPU-IR)
        echo "commit=${NPUIR_COMMIT}" >> "$GITHUB_OUTPUT"
        echo "AscendNPU-IR commit: ${NPUIR_COMMIT}"

    - name: Compute cache key
      id: cache-key
      run: echo "key=npuir-prebuild-rtti-${{ matrix.arch }}-${{ steps.npuir-version.outputs.commit }}" >> "$GITHUB_OUTPUT"

    - name: Restore NPUIR prebuild from cache
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ env.NPUIR_INSTALL_DIR }}
        key: ${{ steps.cache-key.outputs.key }}

    - name: Initialize AscendNPU-IR submodule
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        git submodule update --init 3rdparty/AscendNPU-IR
        cd 3rdparty/AscendNPU-IR
        git submodule update --init

    - name: Set up Python 3.11
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          clang \
          lld \
          cmake \
          make \
          libzstd-dev \
          zlib1g-dev \
          patch
        pip install numpy pybind11==3.0.1

    - name: Apply patches
      if: steps.cache.outputs.cache-hit != 'true'
      working-directory: 3rdparty/AscendNPU-IR
      run: bash ./build-tools/apply_patches.sh

    - name: Configure AscendNPU-IR
      if: steps.cache.outputs.cache-hit != 'true'
      working-directory: 3rdparty/AscendNPU-IR
      run: |
        NPUIR_ROOT=$(pwd)
        cmake third-party/llvm-project/llvm -B build \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_PROJECTS="mlir" \
          -DLLVM_EXTERNAL_PROJECTS="bishengir" \
          -DLLVM_EXTERNAL_BISHENGIR_SOURCE_DIR="${NPUIR_ROOT}" \
          -DLLVM_TARGETS_TO_BUILD="host" \
          -DLLVM_ENABLE_RTTI=ON \
          -DLLVM_ENABLE_ASSERTIONS=OFF \
          -DMLIR_ENABLE_BINDINGS_PYTHON=ON \
          -DLLVM_INSTALL_UTILS=ON \
          -DPython3_EXECUTABLE=$(which python3) \
          -DCMAKE_INSTALL_PREFIX="${NPUIR_ROOT}/build/install" \
          -DBSPUB_DAVINCI_BISHENGIR=ON \
          -DBISHENGIR_PUBLISH=OFF \
          -DCMAKE_LINKER=lld \
          -DLLVM_ENABLE_LLD=ON

    - name: Build AscendNPU-IR
      if: steps.cache.outputs.cache-hit != 'true'
      working-directory: 3rdparty/AscendNPU-IR
      run: |
        cmake --build build --target MLIRPythonModules -j$(nproc)
        cmake --build build -j$(nproc)

    - name: Install AscendNPU-IR
      if: steps.cache.outputs.cache-hit != 'true'
      working-directory: 3rdparty/AscendNPU-IR
      run: cmake --install build

    - name: Populate cache directory
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p ${{ env.NPUIR_INSTALL_DIR }}
        cp -r 3rdparty/AscendNPU-IR/build/install/* ${{ env.NPUIR_INSTALL_DIR }}/
